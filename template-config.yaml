# OpenSign Railway Template Configuration
# This file documents the template composer settings for wiring services together.
# Use this as a reference when setting up the template in the Railway dashboard.

services:
  # --- OpenSign Server (Backend API) ---
  server:
    source: github_repo  # This repo, root: /server
    icon: opensign
    variables:
      # Core Parse Server config
      # IMPORTANT: APP_ID must be "opensign" — the pre-built client Docker image
      # (opensign/opensign:main) has REACT_APP_APPID="opensign" baked in at build
      # time. A mismatched APP_ID causes all Parse API requests to fail with 401.
      APP_ID: opensign
      MASTER_KEY: ${{secret(32)}}
      appName: "OpenSign™"
      PARSE_MOUNT: /app
      NODE_ENV: production
      USE_LOCAL: "true"

      # MongoDB connection - uses Railway managed MongoDB
      MONGODB_URI: ${{MongoDB.MONGO_URL}}/OpenSignDB

      # URL config - SERVER_URL is the public Parse Server endpoint
      SERVER_URL: https://${{server.RAILWAY_PUBLIC_DOMAIN}}/app
      PUBLIC_URL: https://${{client.RAILWAY_PUBLIC_DOMAIN}}

      # Storage defaults (local filesystem)
      DO_SPACE: ""
      DO_ENDPOINT: ""
      DO_BASEURL: ""
      DO_ACCESS_KEY_ID: ""
      DO_SECRET_ACCESS_KEY: ""
      DO_REGION: ""

      # Email (optional - user configures post-deployment)
      SMTP_ENABLE: "false"
      SMTP_HOST: ""
      SMTP_PORT: ""
      SMTP_USER_EMAIL: ""
      SMTP_PASS: ""
      MAILGUN_API_KEY: ""
      MAILGUN_DOMAIN: ""
      MAILGUN_SENDER: ""

    volumes:
      - mount_path: /usr/src/app/files

  # --- OpenSign Client (React Frontend) ---
  client:
    source: github_repo  # This repo, root: /client
    icon: opensign
    variables:
      REACT_APP_SERVERURL: https://${{server.RAILWAY_PUBLIC_DOMAIN}}/app
      # Must match the server's APP_ID and the value baked into the Docker image
      REACT_APP_APPID: opensign
      PUBLIC_URL: https://${{client.RAILWAY_PUBLIC_DOMAIN}}
      GENERATE_SOURCEMAP: "false"
      NODE_ENV: production

  # --- MongoDB (Railway Managed) ---
  mongodb:
    source: railway_database  # MongoDB plugin
    # Railway provides: MONGO_URL, MONGOHOST, MONGOPORT, etc.
